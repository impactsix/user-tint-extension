<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="128" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e5f7a"/>
      <stop offset="50%" stop-color="#2d8f6f"/>
      <stop offset="100%" stop-color="#3d6bb3"/>
    </linearGradient>
    <linearGradient id="shine" x1="64" y1="14" x2="64" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Outer frame: editor window -->
  <rect x="12" y="16" width="104" height="96" rx="14" ry="14" fill="#2b2b30" stroke="#1e1e22" stroke-width="2"/>
  <!-- Title bar tint strip -->
  <rect x="14" y="18" width="100" height="28" rx="12" fill="url(#bar)"/>
  <rect x="14" y="18" width="100" height="16" rx="12" fill="url(#shine)"/>
  <!-- Window dots -->
  <circle cx="30" cy="32" r="4" fill="#ffffff" fill-opacity="0.35"/>
  <circle cx="44" cy="32" r="4" fill="#ffffff" fill-opacity="0.2"/>
  <circle cx="58" cy="32" r="4" fill="#ffffff" fill-opacity="0.12"/>
  <!-- Content area hint: subtle panels = workspaces -->
  <rect x="22" y="54" width="36" height="46" rx="6" fill="#3c3c42" stroke="#4a4a52" stroke-width="1"/>
  <rect x="64" y="54" width="42" height="22" rx="6" fill="#35353b" stroke="#4a4a52" stroke-width="1"/>
  <rect x="64" y="80" width="42" height="20" rx="6" fill="#35353b" stroke="#4a4a52" stroke-width="1"/>
</svg>
